<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeQuest - Ending</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f0f1a, #05050a);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* glow orbs */
body::before, body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(80px);
}

body::before {
    background: #6c5ce7;
    top: -100px;
    left: -100px;
    opacity: 0.4;
}

body::after {
    background: #3498db;
    bottom: -120px;
    right: -120px;
    opacity: 0.3;
}

.container {
    text-align: center;
    z-index: 2;
}

h1 {
    font-size: 4rem;
    margin-bottom: 10px;
    letter-spacing: 3px;
    color: #a29bfe;
    text-shadow: 0 0 20px rgba(108,92,231,0.6);
}

.subtitle {
    font-size: 1.2rem;
    opacity: 0.8;
    margin-bottom: 40px;
}

.box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    max-width: 500px;
}

.btn {
    margin-top: 25px;
    padding: 14px 30px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg,#6c5ce7,#3498db);
    color: white;
    cursor: pointer;
    font-size: 1rem;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}
</style>

</head>
<body>

<div class="container">
    <h1>CODE RESTORED</h1>
    <div class="subtitle">Tu as vaincu le bug final : JavaScript</div>

    <div class="box">
        <p>
            Le monde du code redevient stable...<br><br>
            HTML, CSS et Markdown ont été libérés.<br>
            Le système peut enfin respirer.
        </p>

        <button class="btn" onclick="restart()">Rejouer l’aventure</button>
    </div>
</div>

<script>
function restart() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
