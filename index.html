<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CodeQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top left,#433b77 0%,transparent 35%),
radial-gradient(circle at bottom right,#0f4c81 0%,transparent 30%),
linear-gradient(90deg,#0b0b18,#060610);
color:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* BG FX */

body::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
background-size:50px 50px;
opacity:.25;
}

/* MAIN */

.container{
width:100%;
max-width:1400px;
display:flex;
justify-content:space-between;
align-items:center;
padding:80px;
position:relative;
z-index:2;
opacity:1;
transition:opacity .65s ease,transform .65s ease;
}

body.intro-playing .container{
opacity:0;
transform:scale(.98);
pointer-events:none;
}

body.menu-ready .container{
animation:menuReveal .75s ease both;
}

/* INTRO POPUP */

.intro-popup{
position:fixed;
inset:0;
z-index:10;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at center,rgba(113,101,255,.18),transparent 38%),
rgba(4,6,18,.76);
backdrop-filter:blur(10px);
animation:introBackdrop 3s ease forwards;
}

.intro-card{
position:relative;
padding:36px 46px;
border-radius:24px;
border:1px solid rgba(255,255,255,.14);
background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.04));
box-shadow:
0 0 45px rgba(125,189,255,.2),
0 24px 70px rgba(0,0,0,.48);
overflow:hidden;
animation:introCard 3s ease forwards;
}

.intro-card::before{
content:"";
position:absolute;
inset:-2px;
background:linear-gradient(90deg,transparent,rgba(125,189,255,.44),transparent);
transform:translateX(-120%);
animation:introShine 1.7s .45s ease forwards;
}

.intro-text{
position:relative;
font-size:clamp(28px,4vw,54px);
font-weight:800;
letter-spacing:2px;
text-align:center;
background:linear-gradient(90deg,#fff,#b8a8ff,#7dbdff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 28px rgba(125,189,255,.35);
}

/* LEFT */

.left{
max-width:520px;
animation:fadeUp 1s ease;
}

.logo{
font-size:88px;
font-weight:800;
line-height:1;
background:linear-gradient(to right,#b8a8ff,#7dbdff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px rgba(160,140,255,.35);
}

.desc{
margin-top:35px;
font-size:20px;
line-height:1.6;
color:rgba(255,255,255,.75);
max-width:500px;
}

.feature{
margin-top:45px;
display:flex;
align-items:center;
gap:12px;
font-size:18px;
color:rgba(255,255,255,.6);
}

/* CARD */

.card{
width:380px;
padding:45px;
border-radius:28px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 10px 40px rgba(0,0,0,.45);
animation:fadeUp 1s ease;
}

.card h2{
font-size:48px;
margin-bottom:12px;
text-align:center;
}

.card p{
text-align:center;
color:rgba(255,255,255,.6);
margin-bottom:35px;
}

/* PLAY BUTTON */

.play-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:700;
cursor:pointer;
color:white;
background:
linear-gradient(90deg,#7165ff,#3ca5ec);
transition:.25s;
box-shadow:0 10px 25px rgba(87,124,255,.35);
}

.play-btn:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 16px 35px rgba(87,124,255,.45);
}

/* AUDIO */

.audio-box{
margin-top:30px;
display:flex;
flex-direction:column;
gap:18px;
align-items:center;
}

.controls{
display:flex;
gap:14px;
align-items:center;
}

.audio-btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#6f5ef7;
color:white;
font-weight:600;
transition:.2s;
}

.audio-btn:hover{
transform:scale(1.05);
}

.volume{
width:190px;
accent-color:#2196f3;
height:9px;
appearance:none;
-webkit-appearance:none;
border-radius:999px;
outline:none;
background:linear-gradient(90deg,#7165ff 0%,#3ca5ec 50%,rgba(255,255,255,.18) 50%);
cursor:pointer;
}

.volume::-webkit-slider-thumb{
appearance:none;
-webkit-appearance:none;
width:24px;
height:24px;
border-radius:50%;
background:#fff;
border:3px solid #7dbdff;
box-shadow:0 0 18px rgba(125,189,255,.75);
}

.volume::-moz-range-thumb{
width:20px;
height:20px;
border-radius:50%;
background:#fff;
border:3px solid #7dbdff;
box-shadow:0 0 18px rgba(125,189,255,.75);
}

/* GLOW */

.glow{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:#6f5ef7;
filter:blur(140px);
opacity:.2;
left:-180px;
top:-180px;
}

.glow2{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
background:#1fa2ff;
filter:blur(120px);
opacity:.18;
right:-120px;
bottom:-120px;
}

/* ANIM */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes menuReveal{
from{
opacity:0;
transform:translateY(18px) scale(.98);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}

}

@keyframes introBackdrop{
0%,72%{
opacity:1;
}

100%{
opacity:0;
visibility:hidden;
}

}

@keyframes introCard{
0%{
opacity:0;
transform:translateY(18px) scale(.9);
filter:blur(4px);
}

18%,68%{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0);
}

100%{
opacity:0;
transform:translateY(-18px) scale(1.04);
filter:blur(5px);
}

}

@keyframes introShine{
to{
transform:translateX(120%);
}

}

/* RESPONSIVE */

@media(max-width:1100px){

.container{
flex-direction:column;
gap:60px;
text-align:center;
padding:40px;
}

.logo{
font-size:70px;
}

.card{
width:100%;
max-width:420px;
}

}

</style>
</head>

<body class="intro-playing">

<div class="glow"></div>
<div class="glow2"></div>

<div class="intro-popup" id="introPopup">
<div class="intro-card">
<div class="intro-text">PSIN ASTROLABE PRÉSENTE:</div>
</div>
</div>

<div class="container">

<!-- LEFT -->

<div class="left">

<div class="logo">
CodeQuest
</div>

<div class="desc">
Lance ton aventure de combat en HTML / CSS / JavaScript.
Apprends en battant des ennemis dans un RPG interactif futuriste.
</div>

<div class="feature">
⚔️ Apprends en combattant
</div>

</div>

<!-- RIGHT -->

<div class="card">

<h2>Menu</h2>

<p>
Prêt à commencer ?
</p>

<button class="play-btn" onclick="playGame()">
Jouer
</button>

<div class="audio-box">

<div class="controls">

<button class="audio-btn" onclick="toggleMusic()">
🔊 Music
</button>

<input
type="range"
min="0"
max="1"
step="0.01"
value="0.5"
class="volume"
id="volumeSlider"
>

</div>

</div>

</div>

</div>

<!-- MUSIC -->

<audio id="bgMusic" loop>
<source src="src/audio/menu.mp3" type="audio/mp3">
</audio>

<script>

// ====================
// MUSIC
// ====================

const music = document.getElementById("bgMusic");
const volumeSlider = document.getElementById("volumeSlider");

function getSavedMusicVolume(){
let saved = Number(localStorage.getItem("musicVolume"));
return Number.isFinite(saved) ? Math.min(1, Math.max(0, saved)) : 0.5;
}

function applyMusicVolume(value){
let percent = Math.round(value * 100);
music.volume = value;
volumeSlider.value = value;
volumeSlider.style.background = "linear-gradient(90deg,#7165ff 0%,#3ca5ec " + percent + "%,rgba(255,255,255,.18) " + percent + "%)";
localStorage.setItem("musicVolume", String(value));
}

applyMusicVolume(getSavedMusicVolume());

setTimeout(()=>{

document.body.classList.remove("intro-playing");
document.body.classList.add("menu-ready");

const introPopup = document.getElementById("introPopup");

if(introPopup){
introPopup.remove();
}

},3000);

volumeSlider.addEventListener("input",(e)=>{

applyMusicVolume(Number(e.target.value));
music.play().catch(()=>{});

});

function toggleMusic(){

if(music.paused){

music.play();

}else{

music.pause();

}

}

// ====================
// PLAY
// ====================

function playGame(){

music.play();

window.location.href = "intro.html";

}

</script>

</body>
</html>
