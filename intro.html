<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeQuest - Prologue</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* CAMERA EFFECT */
.scene {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(1.1);
    animation: cameraIn 2s ease forwards;
}

@keyframes cameraIn {
    from { transform: scale(1.25); filter: blur(6px); }
    to { transform: scale(1.0); filter: blur(0); }
}

.box {
    width: 70%;
    max-width: 800px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    text-align: center;
}

h1 {
    color: #a29bfe;
    margin-bottom: 20px;
}

#text {
    min-height: 120px;
    font-size: 1.2rem;
    line-height: 1.6;
}

.choices {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #3b3b55;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #4b4b70;
}

.name-form {
    margin-top: 20px;
    display: flex;
    gap: 12px;
}

.name-form input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.35);
    color: white;
    font: inherit;
}

.name-form input:focus {
    outline: 2px solid #a29bfe;
}

.name-form button {
    min-width: 150px;
}

/* FLASH */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
}

.flash.active {
    animation: flashAnim 0.6s ease;
}

@keyframes flashAnim {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<div class="scene">
    <div class="box">

        <h1>⚔️ CodeQuest</h1>

        <div id="text"></div>

        <div class="choices" id="choices"></div>

    </div>
</div>

<div class="flash" id="flash"></div>

<script>
const textBox = document.getElementById("text");
const choicesBox = document.getElementById("choices");
const flash = document.getElementById("flash");

function typeText(text, cb) {

    textBox.innerHTML = "";
    let i = 0;

    const interval = setInterval(() => {

        textBox.innerHTML += text[i];
        i++;

        if (i >= text.length) {
            clearInterval(interval);
            if (cb) cb();
        }

    }, 25);
}

/* ================= DIALOGUES ================= */

function step1() {

    typeText("Tu ouvres les yeux dans un monde instable de code...");

    setTimeout(() => {
        choicesBox.innerHTML = `
            <button onclick="step2()">Continuer</button>
            <button onclick="step2()">Observer l'environnement</button>
        `;
    }, 1200);
}

function step2() {

    choicesBox.innerHTML = "";

    typeText("Les entités HTML, CSS et Markdown ont perdu le contrôle...");

    setTimeout(() => {
        choicesBox.innerHTML = `
            <button onclick="step3()">Je dois les arrêter</button>
            <button onclick="step3()">Compris...</button>
        `;
    }, 1500);
}

function step3() {

    choicesBox.innerHTML = "";

    typeText("Prepare-toi au chemin pour le sauvetage du monde!");

    setTimeout(() => {
        step4();

    }, 1500);
}

function step4() {

    choicesBox.innerHTML = "";

    typeText("Avant de partir, choisis le nom de ton heros.", () => {
        choicesBox.innerHTML = `
            <form class="name-form" onsubmit="savePlayerName(event)">
                <input id="playerNameInput" maxlength="18" placeholder="Nom du joueur" autocomplete="off" autofocus>
                <button type="submit">Continuer</button>
            </form>
        `;

        document.getElementById("playerNameInput").focus();
    });
}

function savePlayerName(event) {

    event.preventDefault();

    const input = document.getElementById("playerNameInput");
    const name = input.value.trim() || "Heros du Code";

    localStorage.setItem("playerName", name.slice(0, 18));
    localStorage.setItem("heroHP", "100");

    flash.classList.add("active");

    setTimeout(() => {
        window.location.href = "menu.html";
    }, 600);
}
step1();
</script>

</body>
</html>
