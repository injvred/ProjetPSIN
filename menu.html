<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeQuest - Medieval Path</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="victory.css">

<style>

:root{
--cyan:#00e5ff;
--purple:#8b5cf6;
--gold:#fbbf24;
--dark:rgba(0,0,0,.6);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Orbitron,sans-serif;
overflow:hidden;
background:#050812;
color:white;
}

/* =========================
   BACKGROUND MAP
========================= */

.bg{
position:fixed;
inset:0;
z-index:-3;
}

.bg img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.55) contrast(1.2) saturate(1.3);
transform:scale(1.05);
}

.overlay{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,transparent 0%,rgba(0,0,0,.75) 65%),
linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.85));
z-index:-2;
}

/* =========================
   TITLE
========================= */

.header{
position:absolute;
top:20px;
width:100%;
text-align:center;
z-index:10;
}

.title{
font-size:54px;
font-weight:800;
letter-spacing:3px;
background:linear-gradient(90deg,#fff,var(--cyan),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 25px rgba(0,229,255,.3);
}

.subtitle{
font-size:12px;
color:#cbd5e1;
margin-top:6px;
}

.hub-audio{
position:absolute;
top:96px;
left:28px;
z-index:20;
width:280px;
padding:14px 16px;
border-radius:16px;
background:rgba(8,14,30,.74);
border:1px solid rgba(0,229,255,.22);
box-shadow:0 0 22px rgba(0,229,255,.14);
backdrop-filter:blur(10px);
}

.hub-audio-label{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:9px;
font-size:11px;
font-weight:800;
letter-spacing:2px;
color:var(--cyan);
}

.hub-audio-label::after{
content:attr(data-value);
font-size:11px;
color:#cbd5e1;
letter-spacing:0;
}

.hub-slider{
width:100%;
height:9px;
appearance:none;
-webkit-appearance:none;
border-radius:999px;
outline:none;
background:linear-gradient(90deg,var(--cyan) 0%,var(--purple) 50%,#1e293b 50%);
cursor:pointer;
}

.hub-slider::-webkit-slider-thumb{
appearance:none;
-webkit-appearance:none;
width:24px;
height:24px;
border-radius:50%;
background:#fff;
border:3px solid var(--cyan);
box-shadow:0 0 18px rgba(0,229,255,.75);
}

.hub-slider::-moz-range-thumb{
width:20px;
height:20px;
border-radius:50%;
background:#fff;
border:3px solid var(--cyan);
box-shadow:0 0 18px rgba(0,229,255,.75);
}

/* =========================
   MAP WRAPPER
========================= */

.map{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

/* =========================
   ROUTE LINE (MAIN PATH)
========================= */

.route{
position:absolute;
width:85%;
height:6px;
background:linear-gradient(90deg,
transparent,
rgba(0,229,255,.4),
rgba(139,92,246,.6),
rgba(0,229,255,.4),
transparent
);

border-radius:50px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
filter:drop-shadow(0 0 15px rgba(0,229,255,.25));
}

/* glowing moving light on path */
.route::after{
content:"";
position:absolute;
width:120px;
height:6px;
background:rgba(255,255,255,.6);
border-radius:50px;
filter:blur(6px);
animation:move 3s linear infinite;
}

@keyframes move{
0%{left:-120px;}
100%{left:100%;}
}

/* =========================
   NODES LINE LAYOUT
========================= */

.nodes{
position:absolute;
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
}

/* NODE BASE */
.node{
width:90px;
height:90px;
background:rgba(15,23,42,.75);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

cursor:pointer;

backdrop-filter:blur(10px);

transition:.25s;

position:relative;

box-shadow:0 0 25px rgba(0,0,0,.5);
}

/* hover */
.node:hover{
transform:translateY(-18px) scale(1.15);
border-color:rgba(0,229,255,.7);
box-shadow:0 0 40px rgba(0,229,255,.25);
}

.node.locked{
filter:grayscale(1) brightness(.45);
cursor:not-allowed;
}

.node.locked:hover{
transform:none;
border-color:rgba(255,255,255,.12);
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.node.locked::after{
background:#64748b;
box-shadow:none;
}

.lock-icon{
position:absolute;
width:42px;
height:42px;
object-fit:contain;
z-index:3;
filter:drop-shadow(0 0 12px rgba(0,0,0,.8));
}

/* glow dot under node */
.node::after{
content:"";
position:absolute;
bottom:-12px;
width:10px;
height:10px;
border-radius:50%;
background:var(--cyan);
box-shadow:0 0 15px var(--cyan);
}

/* number */
.num{
font-size:18px;
font-weight:800;
color:var(--cyan);
margin-bottom:4px;
}

/* label */
.node b{
font-size:12px;
letter-spacing:1px;
}

.node span{
font-size:10px;
color:#94a3b8;
}

/* =========================
   SPECIAL LEVEL 8 (BOSS)
========================= */

.n8{
width:120px;
height:120px;
border:2px solid rgba(251,191,36,.7);
box-shadow:0 0 40px rgba(251,191,36,.25);
}

.n8 .num{
color:var(--gold);
}

/* pulse boss */
.n8::before{
content:"";
position:absolute;
inset:-10px;
border-radius:20px;
border:2px solid rgba(251,191,36,.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:.5;}
50%{transform:scale(1.2);opacity:.2;}
100%{transform:scale(1);opacity:.5;}
}

/* =========================
   FOOTER
========================= */

.footer{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-size:12px;
color:#94a3b8;
}

.minigame-entry{
position:absolute;
right:28px;
bottom:28px;
display:none;
z-index:20;
padding:16px 22px;
border:1px solid rgba(251,191,36,.55);
border-radius:16px;
background:linear-gradient(135deg,rgba(251,191,36,.24),rgba(139,92,246,.26));
color:white;
font-family:Orbitron,sans-serif;
font-size:14px;
font-weight:800;
letter-spacing:1px;
cursor:pointer;
box-shadow:0 0 28px rgba(251,191,36,.22);
transition:.25s;
}

.minigame-entry:hover{
transform:translateY(-5px) scale(1.04);
box-shadow:0 0 40px rgba(251,191,36,.34);
}

.minigame-entry.visible{
display:block;
}

/* =========================
   CLICK EFFECT
========================= */

.flash{
position:fixed;
inset:0;
background:rgba(0,229,255,.15);
opacity:0;
pointer-events:none;
}

.flash.active{
animation:flash .25s ease;
}

@keyframes flash{
50%{opacity:1;}
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:900px){

.nodes{
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.route{
display:none;
}

}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
<img src="https://media.discordapp.net/attachments/1496836122938970123/1508796842731769856/New_Piskel_11.png?ex=6a16d80f&is=6a15868f&hm=9dd3d5b5c6e51e83dc9db9167afb94c5512335f41f385ffd11180eeed273f31f&=&format=webp&quality=lossless&width=1074&height=695">
</div>

<div class="overlay"></div>

<!-- TITLE -->
<div class="header">
<div class="title">CODEQUEST MAP</div>
<div class="subtitle">PATH FROM VILLAGE TO CASTLE</div>
</div>

<div class="hub-audio">
<div class="hub-audio-label" id="musicVolumeLabel" data-value="35%">MUSIC</div>
<input class="hub-slider" id="musicSlider" type="range" min="0" max="1" step="0.01" value="0.35">
</div>

<!-- MAP -->
<div class="map">

<div class="route"></div>

<div class="nodes">
<div class="node" data-level="1" onclick="play(1)">
  <img src="src/img/1.webp">
  <div class="dot"></div>
</div>

<div class="node" data-level="2" onclick="play(2)">
  <img src="src/img/2.webp">
  <div class="dot"></div>
</div>

<div class="node" data-level="3" onclick="play(3)">
  <img src="src/img/3.webp">
  <div class="dot"></div>
</div>

<div class="node" data-level="4" onclick="play(4)">
  <img src="src/img/4.webp">
  <div class="dot"></div>
</div>

<div class="node" data-level="5" onclick="play(5)">
  <img src="src/img/5.webp">
  <div class="dot"></div>
</div>

<div class="node" data-level="6" onclick="play(6)">
  <img src="src/img/6.webp">
  <div class="dot"></div>
</div>

<div class="node" data-level="7" onclick="play(7)">
  <img src="src/img/7.webp">
  <div class="dot"></div>
</div>

<div class="node n8" data-level="8" onclick="play(8)">
  <img src="src/img/8.webp">
  <div class="dot"></div>
</div>

</div>
</div>

<div class="footer">
Clique sur un niveau pour commencer
</div>

<button class="minigame-entry" id="minigameEntry" onclick="openMiniGames()">
MINI-JEUX
</button>

<div class="flash" id="flash"></div>

<audio id="bgMusic" autoplay loop>
<source src="src/audio/menu.mp3" type="audio/mp3">
</audio>

<script>

const lockIcon = "src/img/iconeniveaubloque.webp";
const music = document.getElementById("bgMusic");
const musicSlider = document.getElementById("musicSlider");
const musicVolumeLabel = document.getElementById("musicVolumeLabel");

function getSavedMusicVolume(){
let saved = Number(localStorage.getItem("musicVolume"));
return Number.isFinite(saved) ? Math.min(1, Math.max(0, saved)) : 0.35;
}

function applyMusicVolume(value){
let percent = Math.round(value * 100);
music.volume = value;
musicSlider.value = value;
musicSlider.style.background = "linear-gradient(90deg,var(--cyan) 0%,var(--purple) " + percent + "%,#1e293b " + percent + "%)";
musicVolumeLabel.dataset.value = percent + "%";
localStorage.setItem("musicVolume", String(value));
}

applyMusicVolume(getSavedMusicVolume());
musicSlider.addEventListener("input",event=>{
applyMusicVolume(Number(event.target.value));
music.play().catch(()=>{});
});
music.play().catch(()=>{});

function getUnlockedLevel(){
return Number(localStorage.getItem("unlockedLevel")) || 1;
}

function updateLocks(){

let unlockedLevel = getUnlockedLevel();

document.querySelectorAll(".node").forEach(node=>{

let lvl = Number(node.dataset.level);
let oldLock = node.querySelector(".lock-icon");

if(oldLock){
oldLock.remove();
}

if(lvl > unlockedLevel){
node.classList.add("locked");

let lock = document.createElement("img");
lock.src = lockIcon;
lock.alt = "Niveau bloqué";
lock.className = "lock-icon";
node.appendChild(lock);
}else{
node.classList.remove("locked");
}

});

}

function play(lvl){

if(lvl > getUnlockedLevel()){
return;
}

let f=document.getElementById("flash");
f.classList.add("active");

setTimeout(()=>{

localStorage.setItem("level",lvl);
window.location.href="level"+lvl+".html";

},200);

}

function openMiniGames(){

let f=document.getElementById("flash");
f.classList.add("active");

setTimeout(()=>{
window.location.href="minigames.html";
},200);

}

function updateMiniGameButton(){

let entry = document.getElementById("minigameEntry");

if(localStorage.getItem("gameCompleted") === "true" || getUnlockedLevel() >= 8){
entry.classList.add("visible");
}

}

updateLocks();
updateMiniGameButton();

</script>

</body>
</html>
